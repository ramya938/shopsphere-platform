name: ShopSphere AI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Test matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - shopsphere-user-service
          - shopsphere-product-service
          - shopsphere-order-service
          - shopsphere-payment-service
          - shopsphere-notification-service
          - shopsphere-gateway
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f ${{ matrix.service }}/requirements.txt ]; then
          pip install -r ${{ matrix.service }}/requirements.txt
        fi
        # Ensure standard testing utilities are present
        pip install pytest pytest-asyncio pytest-httpx fakeredis pyjwt cryptography pydantic-settings loguru

    - name: Run Pytest
      run: |
        cd ${{ matrix.service }}
        python -m pytest

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        service:
          - shopsphere-user-service
          - shopsphere-product-service
          - shopsphere-order-service
          - shopsphere-payment-service
          - shopsphere-notification-service
          - shopsphere-gateway
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service }}
        file: ./${{ matrix.service }}/Dockerfile
        push: false
        tags: shopsphere/${{ matrix.service }}:latest
